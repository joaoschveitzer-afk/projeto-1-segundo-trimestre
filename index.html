<<!DOCTYPE html>
<html lang="PT-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Trabalho</title>
        <style>
            /* Define cores básicas para o corpo da página para evitar contraste ruim fora das caixas */
            body {
                background-color: #2c2c2c; /* Um cinza escuro para o fundo da página */
                font-family: Arial, sans-serif; /* Uma fonte mais limpa */
                margin: 0;
                padding: 20px;
            }

            header {
                background-color: #8F8FBB;
                color: #000000;
                text-align: center;
                max-width: 800px;
                margin: 0 auto 20px auto; /* Adicionado margem inferior para separar do main */
                padding: 20px; 
                border: 5px solid #000000; /* Corrigido: adicionada cor ao border */
                border-radius: 8px; /* Opcional: cantos arredondados */
            }

            main {
                /* CORRIGIDO: Removidas as aspas simples extras e os comentários misturados */
                background-color: #000000;
                color: #8F8FBB;
                
                max-width: 800px;
                margin: 0 auto;
                padding: 20px; 
                border: 5px solid rgb(52, 77, 78);
                text-align: center; 
                border-radius: 8px; /* Opcional: cantos arredondados */
            }

            /* Estilo básico para a imagem, caso você adicione uma */
            main img {
                max-width: 100%;
                height: auto;
                margin-bottom: 15px;
            }
        </style>
    </head>
    <body>
        <header>
            <h1>Meu Mundo Histórico</h1>
            <p>Curiosidades da história</p>
        </header>
        <main>
            <img src="imagem blog.png" alt="Captura de tela do monitor de um computador exibindo a página web 'Meu Mundo Histórico' em um navegador. A página tem um design de cabeçalho azul-arroxeado e preto, com um logotipo de pixel art de um globo e um livro. O texto na página inclui 'Meu Mundo Histórico', 'Curiosidades da história' e 'Por: João Vanderlei'. O ambiente de trabalho ao redor do monitor é visível.">
            <h2>Tentativa 1</h2>
            <p>Por: João Vanderlei</p>
            <p>Bem-vindo à história</p>
        </main>
    </body>
</html>
